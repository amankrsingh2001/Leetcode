name: Build on PR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Lint, Typecheck, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # 💡 The --filter . flag tells pnpm to target only the root package configuration
      - name: Install dependencies 
        run: pnpm install --frozen-lockfile --filter .

      # 💡 Adding the filter flags here guarantees pnpm targets the local scripts directly
      - name: Check code linting
        run: pnpm --filter . run lint        

      - name: check Typescript Compilation
        run: npx tsc --noEmit
      
      - name: Verify Production Build
        run: pnpm --filter . run build